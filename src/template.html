<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link
		  rel="stylesheet" 
		  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded"
		>
    <title>My todo list</title>
</head>
<body>
	<div class="header">
		<h1>Odin todo list</h1>
	</div>
	<div class="container">
		<div class="sidebar">
			<div class="header">
				<h2>Projects</h2>
				<div class="button"  id="new-project">
					<span class="material-symbols-rounded">add</span>
				</div>
			</div>
			<div class="project-list">
				<ul></ul>
				<div class="button" id="new-project">New project</div>
			</div>
		</div>
		<div class="task-area">
			<div class="header">
				<h2 class="project-title"></h2>
				<div class="button"  id="new-task">New task</div>
			</div>
			<div class="task-list"></div>
		</div>
	</div>
	<dialog class="new-project">
		<form class="new-project">
			<input type="text" class="project-name" name="project-name"
			    placeholder="Insert the project name">
			<div class="buttons">
				<div class="button cancel">Cancel</div>
				<div class="button save">Save</div>
			</div>
		</form>
	</dialog>
    <dialog class="edit-project">
		<form class="edit-project">
			<input type="text" class="project-name" name="project-name"
			    placeholder="Insert the project name">
			<div class="buttons">
				<div class="button cancel">Cancel</div>
				<div class="button save">Save</div>
			</div>
		</form>
	</dialog>
	<dialog class="new-task">
		<form class="new-task">
			<div class="form-content">
				<input type="text" class="task-name" name="task-name"
					placeholder="Insert the task name">
				<div class="task-date">
					<label for="task-date">Due date:</label>
					<input type="date" name="task-date" id="task-date">
				</div>
				<div class="task-priority">
					<label for="task-priority">Priority:</label>
					<select name="task-priority" id="task-priority">
						<option value="pri-low">Low</option>
						<option value="pri-medium">Medium</option>
						<option value="pri-high">High</option>
					</select>
				</div>
				<div class="task-description">
					<label for="task-description">Description:</label>
					<textarea name="task-description" id="task-description"></textarea>
				</div>
			</div>
			<div class="buttons">
				<div class="button cancel">Cancel</div>
				<div class="button save">Save</div>
			</div>
		</form>
	</dialog>
</body>
</html>
